name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          pip install git-cliff || true
          VERSION=$(git cliff --bumped-version 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "No conventional commits found since last tag. Nothing to release."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update crate versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CARGO_VERSION="$VERSION"
          echo "Setting version to $CARGO_VERSION"

          # Update casc-lib version
          sed -i "0,/^version = \".*\"/s//version = \"$CARGO_VERSION\"/" crates/casc-lib/Cargo.toml

          # Update casc-cli version and its casc-lib dependency version
          sed -i "0,/^version = \".*\"/s//version = \"$CARGO_VERSION\"/" crates/casc-cli/Cargo.toml
          sed -i "s/casc-lib = { path = \"..\/casc-lib\", version = \"[^\"]*\"/casc-lib = { path = \"..\/casc-lib\", version = \"$CARGO_VERSION\"/" crates/casc-cli/Cargo.toml

          # Update Cargo.lock
          cargo check --workspace 2>/dev/null || true

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(release): ${{ steps.version.outputs.version }}"
          title: "chore(release): ${{ steps.version.outputs.version }}"
          body: |
            ## Release ${{ steps.version.outputs.version }}

            This PR was auto-generated by [git-cliff](https://git-cliff.org/).

            ### Changes
            - Updated `CHANGELOG.md`
            - Bumped crate versions to `${{ steps.version.outputs.version }}`

            **Merge this PR to trigger the release pipeline.**
          branch: release/${{ steps.version.outputs.version }}
          base: master
          labels: release
          delete-branch: true
