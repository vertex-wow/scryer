name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Extract version from merged release PR and create tag
  tag:
    name: Tag release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from branch
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.extract.outputs.version }}"
          git push origin "${{ steps.extract.outputs.version }}"

  build:
    name: Build (${{ matrix.target }})
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: casc-extractor.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: casc-extractor
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p casc-cli
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          $archive = "casc-extractor-${{ needs.tag.outputs.version }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          archive="casc-extractor-${{ needs.tag.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: casc-extractor-*

  release:
    name: GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish casc-lib
        run: cargo publish -p casc-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish casc-cli
        run: cargo publish -p casc-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
