name: "Feature request"
description: Suggest something you'd like to see in Scryer
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're running into while using Scryer.
      placeholder: "When I try to preview addons that use X, I can't because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough sketches, mockups, or examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer the one above.

  - type: dropdown
    id: wow_target
    attributes:
      label: WoW version target
      description: Is this specific to a particular WoW version?
      options:
        - All versions
        - mainline
        - mists
        - bcc
        - classic_era
